<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EliteKitsPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ⚽ FLOATING LOGOS -->
<div class="floating-logos">
  <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/c/c3/FC_Barcelona.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Paris_Saint-Germain_F.C..svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/7/7c/Manchester_United_FC_crest.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/1/1f/FC_Bayern_Munich_logo.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/e/e9/Argentina_national_football_team_logo.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/0/0f/Morocco_national_football_team_logo.svg">
  <img src="https://upload.wikimedia.org/wikipedia/en/9/96/Belgium_national_football_team_logo.svg">
</div>

<!-- 🔥 DROP BAR -->
<div class="drop-bar">
  🔥 LIMITED DROP — Selling Fast
</div>

<!-- HERO -->
<div class="hero">
  <h1>EliteKitsPro</h1>
  <p>Premium Streetwear Kits</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card" onclick="location.href='morocco.html'">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0478.jpeg">
    <h3>Morocco Jersey</h3>
    <p>€120</p>
    <p class="stock">Only 7 left</p>
  </div>

  <div class="card" onclick="location.href='brazil.html'">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0475.jpeg">
    <h3>Brazil Windbreaker</h3>
    <p>€120</p>
    <p class="stock">Only 5 left</p>
  </div>

</div>

<!-- 🛒 CART -->
<div class="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <p>Total: €<span id="total">0</span></p>
</div>

<!-- ⚙️ CART SCRIPT -->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {
  cart.push({ name, price });
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart() {
  let box = document.getElementById("cart-items");
  let totalBox = document.getElementById("total");

  if (!box || !totalBox) return;

  box.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;

    let div = document.createElement("div");
    div.innerHTML = item.name + " - €" + item.price;
    box.appendChild(div);
  });

  totalBox.innerText = total;
}

updateCart();
</script>

</body>
</html>
