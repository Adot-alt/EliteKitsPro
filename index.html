<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EliteKitsPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<div class="nav">
  <h2 onclick="location.href='index.html'">EliteKitsPro</h2>
  <button onclick="openCart()">Cart 🛒 (<span id="cart-count">0</span>)</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>NEW DROPS</h1>
  <p>Football Kits & Streetwear Resell</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <!-- MOROCCO -->
  <div class="card" onclick="location.href='morocco.html'">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0478.jpeg">
    <h3>Morocco 2026 Jersey</h3>
    <p>€43</p>
  </div>

  <!-- BRAZIL -->
  <div class="card" onclick="location.href='brazil.html'">
    <img src="https://raw.githubusercontent.com/Adot-alt/EliteKitsPro/main/IMG_0475.jpeg">
    <h3>Brazil Windbreaker</h3>
    <p>€55</p>
  </div>

</div>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <p>Total: €<span id="total">0</span></p>

  <button onclick="checkout()">Checkout</button>
</div>

<script>

let cart = [];
let total = 0;

function openCart() {
  document.getElementById("cart").classList.toggle("show");
}

function addToCart(name, price) {
  cart.push({name, price});
  total += price;

  document.getElementById("cart-count").innerText = cart.length;
  updateCart();
}

function updateCart() {
  let box = document.getElementById("cart-items");
  box.innerHTML = "";

  cart.forEach(item => {
    let div = document.createElement("div");
    div.innerHTML = item.name + " - €" + item.price;
    box.appendChild(div);
  });

  document.getElementById("total").innerText = total;
}

function checkout() {
  alert("Connect PayPal here later 🔥");
}

</script>

</body>
</html>
