<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brazil Windbreaker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-page">

  <h1>Brazil Windbreaker</h1>
  <p>€120</p>

  <img id="mainImg" src="https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0488.jpeg?raw=true">

  <div class="variants">
    <button onclick="changeImg('blue')">Blue</button>
    <button onclick="changeImg('white')">White</button>
    <button onclick="changeImg('black')">Black</button>
  </div>

  <button onclick="addToCart('Brazil Windbreaker', 120)">
    Add to Cart
  </button>

</div>

<script>
function changeImg(color){
  let img = document.getElementById("mainImg");

  if(color === "blue"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0488.jpeg?raw=true";
  }
  if(color === "white"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0490.jpeg?raw=true";
  }
  if(color === "black"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0494.jpeg?raw=true";
  }
}
</script>

</body>
</html>
