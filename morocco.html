<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morocco Jersey</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-page">

  <h1>Morocco Jersey</h1>
  <p>€29.99</p>

  <img id="mainImg" src="https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0482.jpeg?raw=true">

  <div class="variants">
    <button onclick="changeImg('home')">Home</button>
    <button onclick="changeImg('away')">Away</button>
  </div>

  <button onclick="addToCart('Morocco Jersey', 29.99)">
    Add to Cart
  </button>

</div>

<script>
function changeImg(type){
  let img = document.getElementById("mainImg");

  if(type === "home"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0482.jpeg?raw=true";
  }

  if(type === "away"){
    img.src = "https://github.com/EliteKitsPro/EliteKitsPro/blob/main/IMG_0485.jpeg?raw=true";
  }
}
</script>

</body>
</html>
